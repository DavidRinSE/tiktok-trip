<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NYC TikTok Spots</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

  #map {
    width: 100vw;
    height: 100dvh;
  }

  /* Emoji markers */
  .marker {
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    transition: transform 0.15s ease;
  }
  .marker:hover { transform: scale(1.2); }
  .marker.hidden { display: none; }

  /* Popup styling */
  .mapboxgl-popup {
    max-width: 280px !important;
  }
  .mapboxgl-popup-content {
    padding: 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
  }
  .popup-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .popup-emoji {
    font-size: 24px;
    line-height: 1;
  }
  .popup-name {
    font-weight: 700;
    font-size: 16px;
  }
  .popup-meta {
    color: #666;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .popup-description {
    margin-bottom: 10px;
  }
  .popup-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .popup-links a {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 8px;
    background: #f0f0f0;
    color: #333;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    min-height: 44px;
    min-width: 44px;
    justify-content: center;
  }
  .popup-links a:active { background: #ddd; }

  /* Filter bar */
  #filters {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0,0,0,0.1);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border: 1px solid #ddd;
    border-radius: 20px;
    background: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn.active {
    background: #333;
    color: #fff;
    border-color: #333;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="filters"></div>

<script>
// --- CONFIGURATION ---
// Replace with your own Mapbox public access token (create one at https://account.mapbox.com/)
// Important! Set up an allowed URL if you are using GitHub Pages so you can commit your token safely
mapboxgl.accessToken = 'pk.eyJ1IjoiY2xhc3N5ZGF2ZSIsImEiOiJjbW05OW9pcTkwMGpkMm9vbDIzMWpweGNoIn0.DYOn1UMPrbJh2eTfxOe-rw';

const DATA_URL = 'places.geojson';
const NYC_CENTER = [-73.98, 40.75];
const DEFAULT_ZOOM = 12;

// Category emoji map for filter buttons
const CATEGORY_EMOJI = {
  'Restaurant': '🍽️',
  'Bar': '🍸',
  'Cafe': '☕',
  'Bakery': '🧁',
  'Pizza': '🍕',
  'Attraction': '🎭',
  'Shop': '🛍️',
  'Hotel': '🏨',
  'Park': '🌳',
};

let markers = [];
let activeCategory = 'All';

// --- MAP INIT ---
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: NYC_CENTER,
  zoom: DEFAULT_ZOOM,
});

map.addControl(new mapboxgl.NavigationControl(), 'top-right');
map.addControl(new mapboxgl.GeolocateControl({ trackUserLocation: true }), 'top-right');

// --- LOAD DATA ---
fetch(DATA_URL)
  .then(res => res.json())
  .then(geojson => {
    const features = geojson.features || [];
    buildMarkers(features);
    buildFilters(features);
  })
  .catch(err => console.error('Failed to load places data:', err));

function buildMarkers(features) {
  features.forEach(feature => {
    const props = feature.properties;
    const coords = feature.geometry.coordinates;

    // Create emoji element
    const el = document.createElement('div');
    el.className = 'marker';
    el.textContent = props.emoji || '📍';
    el.dataset.category = props.category || '';

    // Build popup HTML
    const popupHTML = buildPopupHTML(props, coords);

    const popup = new mapboxgl.Popup({ offset: 25, maxWidth: '280px' })
      .setHTML(popupHTML);

    const marker = new mapboxgl.Marker({ element: el })
      .setLngLat(coords)
      .setPopup(popup)
      .addTo(map);

    markers.push({ marker, el, category: props.category || '' });
  });
}

function buildPopupHTML(props, coords) {
  const name = escapeHTML(props.name || 'Unknown');
  const emoji = props.emoji || '📍';
  const neighborhood = props.neighborhood ? `<div class="popup-meta">${escapeHTML(props.neighborhood)}</div>` : '';
  const rating = props.rating ? `<div class="popup-meta">⭐ ${props.rating}</div>` : '';
  const description = props.description ? `<div class="popup-description">${escapeHTML(props.description)}</div>` : '';
  const address = props.address || '';

  // Google Maps directions deeplink
  const mapsQuery = address ? encodeURIComponent(address) : `${coords[1]},${coords[0]}`;
  const mapsURL = `https://www.google.com/maps/dir/?api=1&destination=${mapsQuery}`;

  let links = `<a href="${mapsURL}" target="_blank" rel="noopener">📍 Directions</a>`;
  if (props.tiktok_url) {
    links += `<a href="${escapeHTML(props.tiktok_url)}" target="_blank" rel="noopener">🎵 TikTok</a>`;
  }

  return `
    <div class="popup-header">
      <span class="popup-emoji">${emoji}</span>
      <span class="popup-name">${name}</span>
    </div>
    ${neighborhood}
    ${rating}
    ${description}
    <div class="popup-links">${links}</div>
  `;
}

function buildFilters(features) {
  const filtersEl = document.getElementById('filters');
  const categories = new Set(features.map(f => f.properties.category).filter(Boolean));

  // "All" button
  const allBtn = createFilterButton('All', '🗺️', true);
  filtersEl.appendChild(allBtn);

  // Sort categories for consistent order
  [...categories].sort().forEach(cat => {
    const emoji = CATEGORY_EMOJI[cat] || '📍';
    const btn = createFilterButton(cat, emoji, false);
    filtersEl.appendChild(btn);
  });
}

function createFilterButton(category, emoji, isActive) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (isActive ? ' active' : '');
  btn.textContent = `${emoji} ${category}`;
  btn.addEventListener('click', () => filterByCategory(category, btn));
  return btn;
}

function filterByCategory(category, clickedBtn) {
  activeCategory = category;

  // Update button states
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  clickedBtn.classList.add('active');

  // Toggle markers
  markers.forEach(({ el, category: cat }) => {
    if (activeCategory === 'All' || cat === activeCategory) {
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  });
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
